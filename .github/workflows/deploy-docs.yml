name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
  workflow_dispatch:

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy on nekte-protocol.github.io
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAGES_DEPLOY_TOKEN }}" \
            https://api.github.com/repos/nekte-protocol/nekte-protocol.github.io/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
