name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - name: Build website
        working-directory: website
        run: pnpm build

      - name: Deploy to nekte-protocol.github.io
        run: |
          cd website/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy: $(date -u '+%Y-%m-%d %H:%M:%S UTC') from ${{ github.sha }}"
          git push --force https://x-access-token:${{ secrets.PAGES_DEPLOY_TOKEN }}@github.com/nekte-protocol/nekte-protocol.github.io.git HEAD:main
